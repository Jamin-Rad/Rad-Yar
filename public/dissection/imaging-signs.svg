<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">Bildgebungszeichen der Arteriendissektion</title>
  <desc id="desc">Vergleich von Crescent sign, String sign, Flame sign und dissecting pseudoaneurysm.</desc>
  <rect width="1200" height="600" rx="36" fill="#07101f"/>
  <text x="55" y="70" fill="#fff" font-family="Arial" font-size="31" font-weight="700">Vier Zeichen – vier diagnostische Aussagen</text>
  <g transform="translate(55 112)">
    <rect width="255" height="410" rx="26" fill="#151d33" stroke="#8b5cf6"/>
    <circle cx="127" cy="135" r="78" fill="#dbeafe"/>
    <circle cx="127" cy="135" r="45" fill="#07101f"/>
    <path d="M72 93 A78 78 0 0 1 72 177 A60 60 0 0 0 93 158 A60 60 0 0 0 93 112Z" fill="#f59e0b"/>
    <text x="127" y="252" text-anchor="middle" fill="#c4b5fd" font-family="Arial" font-size="25" font-weight="700">Crescent sign</text>
    <text x="127" y="286" text-anchor="middle" fill="#fff" font-family="Arial" font-size="18">T1 fat-sat</text>
    <text x="127" y="323" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="17">sichelförmig T1-helles</text>
    <text x="127" y="348" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="17">intramurales Hämatom</text>
  </g>
  <g transform="translate(335 112)">
    <rect width="255" height="410" rx="26" fill="#151d33" stroke="#3b82f6"/>
    <path d="M80 55 C80 125 115 145 115 205 C115 265 90 295 90 340" fill="none" stroke="#bfdbfe" stroke-width="38" stroke-linecap="round"/>
    <path d="M80 55 C80 125 96 150 96 205 C96 265 90 295 90 340" fill="none" stroke="#07101f" stroke-width="12" stroke-linecap="round"/>
    <text x="127" y="252" text-anchor="middle" fill="#93c5fd" font-family="Arial" font-size="25" font-weight="700">String sign</text>
    <text x="127" y="286" text-anchor="middle" fill="#fff" font-family="Arial" font-size="18">CTA / MRA / DSA</text>
    <text x="127" y="323" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="17">langstreckige glatte</text>
    <text x="127" y="348" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="17">Lumeneinengung</text>
  </g>
  <g transform="translate(615 112)">
    <rect width="255" height="410" rx="26" fill="#151d33" stroke="#22d3ee"/>
    <path d="M127 52 L182 310 Q127 365 72 310Z" fill="#cffafe"/>
    <path d="M127 70 L143 280 L127 326 L111 280Z" fill="#07101f"/>
    <text x="127" y="252" text-anchor="middle" fill="#67e8f9" font-family="Arial" font-size="25" font-weight="700">Flame sign</text>
    <text x="127" y="286" text-anchor="middle" fill="#fff" font-family="Arial" font-size="18">CTA / MRA</text>
    <text x="127" y="323" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="17">spitz auslaufender</text>
    <text x="127" y="348" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="17">Gefäßverschluss</text>
  </g>
  <g transform="translate(895 112)">
    <rect width="255" height="410" rx="26" fill="#151d33" stroke="#f59e0b"/>
    <path d="M92 55 V335" stroke="#fde68a" stroke-width="50" stroke-linecap="round"/>
    <path d="M92 55 V335" stroke="#07101f" stroke-width="18" stroke-linecap="round"/>
    <circle cx="155" cy="190" r="68" fill="#fde68a"/>
    <circle cx="145" cy="190" r="40" fill="#07101f"/>
    <text x="127" y="252" text-anchor="middle" fill="#fcd34d" font-family="Arial" font-size="23" font-weight="700">Pseudoaneurysma</text>
    <text x="127" y="286" text-anchor="middle" fill="#fff" font-family="Arial" font-size="18">CTA / MRA / DSA</text>
    <text x="127" y="323" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="17">Wandaussackung;</text>
    <text x="127" y="348" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="17">Embolie-/Rupturrisiko</text>
  </g>
