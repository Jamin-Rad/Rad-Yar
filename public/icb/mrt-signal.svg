<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="520" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="800" fill="#0f172a">MRT-Signalverhalten der ICB · Übersicht nach Stadium</text>

  <!-- Stage columns - 6 stages -->
  <!-- Column widths: 150px each starting at x=0 -->
  <!-- Row heights: header=50, sequence rows=70 each -->

  <!-- Stage headers -->
  <!-- Stage 1: Hyperakut -->
  <rect x="1" y="48" width="148" height="62" fill="#fee2e2" rx="6"/>
  <text x="75" y="68" text-anchor="middle" font-size="12" font-weight="800" fill="#991b1b">HYPERAKUT</text>
  <text x="75" y="84" text-anchor="middle" font-size="11" fill="#b91c1c">&lt; 6 Stunden</text>
  <text x="75" y="99" text-anchor="middle" font-size="10" fill="#dc2626">Oxy-Hb</text>

  <!-- Stage 2: Akut -->
  <rect x="151" y="48" width="148" height="62" fill="#fef3c7" rx="6"/>
  <text x="225" y="68" text-anchor="middle" font-size="12" font-weight="800" fill="#92400e">AKUT</text>
  <text x="225" y="84" text-anchor="middle" font-size="11" fill="#b45309">6 h – 3 Tage</text>
  <text x="225" y="99" text-anchor="middle" font-size="10" fill="#d97706">Deoxy-Hb</text>

  <!-- Stage 3: Früh subakut -->
  <rect x="301" y="48" width="148" height="62" fill="#dcfce7" rx="6"/>
  <text x="375" y="64" text-anchor="middle" font-size="12" font-weight="800" fill="#14532d">FRÜH SUBAKUT</text>
  <text x="375" y="80" text-anchor="middle" font-size="11" fill="#166534">3 – 7 Tage</text>
  <text x="375" y="99" text-anchor="middle" font-size="10" fill="#15803d">Met-Hb intraz.</text>

  <!-- Stage 4: Spät subakut -->
  <rect x="451" y="48" width="148" height="62" fill="#d1fae5" rx="6"/>
  <text x="525" y="64" text-anchor="middle" font-size="12" font-weight="800" fill="#064e3b">SPÄT SUBAKUT</text>
  <text x="525" y="80" text-anchor="middle" font-size="11" fill="#065f46">1 – 4 Wochen</text>
  <text x="525" y="99" text-anchor="middle" font-size="10" fill="#047857">Met-Hb extraz.</text>

  <!-- Stage 5: Früh chronisch -->
  <rect x="601" y="48" width="148" height="62" fill="#ede9fe" rx="6"/>
  <text x="675" y="64" text-anchor="middle" font-size="12" font-weight="800" fill="#4c1d95">FRÜH CHRONISCH</text>
  <text x="675" y="80" text-anchor="middle" font-size="11" fill="#5b21b6">Monate</text>
  <text x="675" y="99" text-anchor="middle" font-size="10" fill="#6d28d9">Hämosiderin + Met-Hb</text>

  <!-- Stage 6: Spät chronisch -->
  <rect x="751" y="48" width="148" height="62" fill="#f1f5f9" rx="6"/>
  <text x="825" y="64" text-anchor="middle" font-size="12" font-weight="800" fill="#1e293b">SPÄT CHRONISCH</text>
  <text x="825" y="80" text-anchor="middle" font-size="11" fill="#334155">Jahre</text>
  <text x="825" y="99" text-anchor="middle" font-size="10" fill="#475569">Hämosiderin</text>

  <!-- Row label background -->
  <!-- T1 row -->
  <rect x="1" y="112" width="898" height="70" fill="#f0f9ff" rx="4"/>
  <text x="450" y="140" text-anchor="middle" font-size="13" font-weight="800" fill="#0369a1">T1-Wichtung</text>

  <!-- T2 row -->
  <rect x="1" y="184" width="898" height="70" fill="#fef9ee" rx="4"/>
  <text x="450" y="212" text-anchor="middle" font-size="13" font-weight="800" fill="#92400e">T2-Wichtung</text>

  <!-- T2*/SWI row -->
  <rect x="1" y="256" width="898" height="70" fill="#f0fdf4" rx="4"/>
  <text x="450" y="284" text-anchor="middle" font-size="13" font-weight="800" fill="#166534">T2*/SWI</text>

  <!-- DWI row -->
  <rect x="1" y="328" width="898" height="70" fill="#fdf4ff" rx="4"/>
  <text x="450" y="356" text-anchor="middle" font-size="13" font-weight="800" fill="#6b21a8">DWI</text>

  <!-- Signal value helper function: brightness 0=black, 1=dark-gray, 2=iso-gray, 3=bright-white -->
  <!-- Color mapping: hypo=#1e293b(dark), iso=#94a3b8(gray), hyper=#ffffff(white) with bg colors -->

  <!-- === Stage 1: Hyperakut === -->
  <!-- T1: iso/leicht hypo -->
  <rect x="20" y="122" width="110" height="50" rx="8" fill="#94a3b8"/>
  <text x="75" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">iso / ↓</text>

  <!-- T2: hyperintens (wie Wasser) -->
  <rect x="20" y="194" width="110" height="50" rx="8" fill="#f8fafc"/>
  <rect x="20" y="194" width="110" height="50" rx="8" fill="none" stroke="#bfe3ff" stroke-width="1.5"/>
  <text x="75" y="224" text-anchor="middle" font-size="12" font-weight="700" fill="#0369a1">hyperintens ↑↑</text>

  <!-- T2*/SWI: leicht hypo -->
  <rect x="20" y="266" width="110" height="50" rx="8" fill="#475569"/>
  <text x="75" y="296" text-anchor="middle" font-size="12" font-weight="700" fill="#e2e8f0">leicht hypo ↓</text>

  <!-- DWI: iso/↑ (analog T2) -->
  <rect x="20" y="338" width="110" height="50" rx="8" fill="#c4b5fd"/>
  <text x="75" y="368" text-anchor="middle" font-size="11" font-weight="700" fill="#3b0764">analog T2w</text>

  <!-- === Stage 2: Akut === -->
  <!-- T1: iso/hypo -->
  <rect x="170" y="122" width="110" height="50" rx="8" fill="#94a3b8"/>
  <text x="225" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">iso / hypo ↓</text>

  <!-- T2: deutlich hypo (Blooming) -->
  <rect x="170" y="194" width="110" height="50" rx="8" fill="#1e293b"/>
  <text x="225" y="224" text-anchor="middle" font-size="12" font-weight="700" fill="#e2e8f0">stark hypo ↓↓</text>

  <!-- T2*: stark hypo Blooming -->
  <rect x="170" y="266" width="110" height="50" rx="8" fill="#0f172a"/>
  <text x="225" y="296" text-anchor="middle" font-size="12" font-weight="700" fill="#f8fafc">Blooming ↓↓↓</text>

  <!-- DWI: inhomogen -->
  <rect x="170" y="338" width="110" height="50" rx="8" fill="#ddd6fe"/>
  <text x="225" y="368" text-anchor="middle" font-size="11" font-weight="700" fill="#3b0764">inhomogen</text>

  <!-- === Stage 3: Früh subakut === -->
  <!-- T1: HELL! (hyperintens) – most important sign -->
  <rect x="320" y="122" width="110" height="50" rx="8" fill="#fef9c3" stroke="#fbbf24" stroke-width="2"/>
  <text x="375" y="144" text-anchor="middle" font-size="11" font-weight="800" fill="#713f12">T1 HELL ↑↑</text>
  <text x="375" y="160" text-anchor="middle" font-size="10" fill="#854d0e">★ Wendepunkt</text>

  <!-- T2: hypo -->
  <rect x="320" y="194" width="110" height="50" rx="8" fill="#1e293b"/>
  <text x="375" y="224" text-anchor="middle" font-size="12" font-weight="700" fill="#e2e8f0">hypo ↓</text>

  <!-- T2*/SWI: deutlich hypo -->
  <rect x="320" y="266" width="110" height="50" rx="8" fill="#0f172a"/>
  <text x="375" y="296" text-anchor="middle" font-size="12" font-weight="700" fill="#f8fafc">deutl. hypo ↓↓</text>

  <!-- DWI: T2-Shine-through -->
  <rect x="320" y="338" width="110" height="50" rx="8" fill="#ede9fe"/>
  <text x="375" y="368" text-anchor="middle" font-size="11" font-weight="700" fill="#3b0764">T2-Shine-through</text>

  <!-- === Stage 4: Spät subakut === -->
  <!-- T1: bright -->
  <rect x="470" y="122" width="110" height="50" rx="8" fill="#fef9c3" stroke="#fbbf24" stroke-width="2"/>
  <text x="525" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">T1 HELL ↑↑</text>

  <!-- T2: HELL! Bright-Bright! -->
  <rect x="470" y="194" width="110" height="50" rx="8" fill="#f0f9ff" stroke="#38bdf8" stroke-width="2"/>
  <text x="525" y="214" text-anchor="middle" font-size="11" font-weight="800" fill="#0c4a6e">T2 HELL ↑↑</text>
  <text x="525" y="230" text-anchor="middle" font-size="10" fill="#0369a1">bright-bright!</text>

  <!-- T2*: hypo Randsaum -->
  <rect x="470" y="266" width="110" height="50" rx="8" fill="#334155"/>
  <text x="525" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#e2e8f0">hypo Randsaum</text>

  <!-- DWI: iso -->
  <rect x="470" y="338" width="110" height="50" rx="8" fill="#c4b5fd"/>
  <text x="525" y="368" text-anchor="middle" font-size="12" font-weight="700" fill="#3b0764">iso</text>

  <!-- === Stage 5: Früh chronisch === -->
  <!-- T1: hyper bis iso -->
  <rect x="620" y="122" width="110" height="50" rx="8" fill="#d1fae5" stroke="#34d399" stroke-width="1"/>
  <text x="675" y="147" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">hyper / iso</text>
  <text x="675" y="162" text-anchor="middle" font-size="10" fill="#059669">(Met-Hb Rest)</text>

  <!-- T2: hyper + hypo Randsaum -->
  <rect x="620" y="194" width="110" height="50" rx="8" fill="#f8fafc" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="675" y="214" text-anchor="middle" font-size="11" font-weight="700" fill="#0369a1">hyper + hypo</text>
  <text x="675" y="230" text-anchor="middle" font-size="10" fill="#0284c7">Randsaum</text>

  <!-- T2*: deutlich hypo Saum -->
  <rect x="620" y="266" width="110" height="50" rx="8" fill="#0f172a"/>
  <text x="675" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#f8fafc">↓↓ hypo Saum</text>

  <!-- DWI: iso -->
  <rect x="620" y="338" width="110" height="50" rx="8" fill="#ede9fe"/>
  <text x="675" y="368" text-anchor="middle" font-size="12" font-weight="700" fill="#3b0764">iso</text>

  <!-- === Stage 6: Spät chronisch === -->
  <!-- T1: iso/hypo -->
  <rect x="770" y="122" width="110" height="50" rx="8" fill="#94a3b8"/>
  <text x="825" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">iso / hypo ↓</text>

  <!-- T2: hypo -->
  <rect x="770" y="194" width="110" height="50" rx="8" fill="#334155"/>
  <text x="825" y="224" text-anchor="middle" font-size="12" font-weight="700" fill="#e2e8f0">hypo ↓</text>

  <!-- T2*/SWI: Blooming Ring! -->
  <rect x="770" y="266" width="110" height="50" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
  <text x="825" y="286" text-anchor="middle" font-size="11" font-weight="800" fill="#d8b4fe">Blooming-Saum</text>
  <text x="825" y="302" text-anchor="middle" font-size="10" fill="#c084fc">persistiert!</text>

  <!-- DWI: iso/hypo -->
  <rect x="770" y="338" width="110" height="50" rx="8" fill="#ddd6fe"/>
  <text x="825" y="368" text-anchor="middle" font-size="12" font-weight="700" fill="#3b0764">iso / hypo</text>

  <!-- Bottom legend -->
  <rect x="0" y="408" width="900" height="112" fill="#f1f5f9"/>
  <text x="450" y="428" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">Legende</text>

  <!-- Legend items -->
  <rect x="30" y="438" width="40" height="20" rx="4" fill="#f8fafc" stroke="#bfe3ff" stroke-width="1.5"/>
  <text x="78" y="452" font-size="11" fill="#334155">Hyperintens (hell)</text>

  <rect x="200" y="438" width="40" height="20" rx="4" fill="#94a3b8"/>
  <text x="248" y="452" font-size="11" fill="#334155">Isointens (mittel)</text>

  <rect x="370" y="438" width="40" height="20" rx="4" fill="#1e293b"/>
  <text x="418" y="452" font-size="11" fill="#334155">Hypointens (dunkel)</text>

  <rect x="550" y="438" width="40" height="20" rx="4" fill="#fef9c3" stroke="#fbbf24" stroke-width="2"/>
  <text x="598" y="452" font-size="11" fill="#334155">Diagnostisch wichtig</text>

  <text x="450" y="490" text-anchor="middle" font-size="11" fill="#64748b">⚠ Stadiengrenzen sind fließend · Konversion läuft von peripher nach zentral · abhängig von Hämatomgröße</text>
  <text x="450" y="508" text-anchor="middle" font-size="10" fill="#94a3b8">Schema basierend auf: Gomori et al. 1985, Edelman et al. 1986, Bradley 1993 · Rad-Yar.de</text>
</svg>
