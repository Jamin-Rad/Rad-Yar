<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800" height="580">
  <defs>
    <radialGradient id="brain" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </radialGradient>
    <radialGradient id="hematoma" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8d8d8"/>
      <stop offset="70%" stop-color="#c8c8c8"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </radialGradient>
    <radialGradient id="edema" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#222222"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
  </defs>
  <rect width="800" height="580" fill="#0d0d0d"/>

  <!-- Brain outline -->
  <ellipse cx="400" cy="280" rx="245" ry="230" fill="url(#brain)" stroke="#555" stroke-width="2"/>

  <!-- Interhemispheric fissure -->
  <line x1="400" y1="52" x2="400" y2="508" stroke="#1a1a1a" stroke-width="4"/>

  <!-- Left ventricle (lateral horn) -->
  <ellipse cx="355" cy="255" rx="22" ry="32" fill="#151515" stroke="#222" stroke-width="1"/>
  <!-- Right ventricle (lateral horn) -->
  <ellipse cx="445" cy="255" rx="22" ry="32" fill="#151515" stroke="#222" stroke-width="1"/>
  <!-- 3rd ventricle -->
  <rect x="390" y="242" width="20" height="40" rx="6" fill="#151515"/>

  <!-- Right basal ganglia region (slightly darker) -->
  <ellipse cx="460" cy="275" rx="38" ry="32" fill="#303030"/>

  <!-- Left basal ganglia (normal) -->
  <ellipse cx="340" cy="275" rx="38" ry="32" fill="#303030"/>

  <!-- Perifocal edema (hypodens halo) -->
  <ellipse cx="470" cy="290" rx="75" ry="65" fill="url(#edema)" opacity="0.9"/>

  <!-- Hematoma (hyperdens) -->
  <ellipse cx="470" cy="292" rx="52" ry="46" fill="url(#hematoma)"/>

  <!-- Sulci lines (cortex folds) -->
  <path d="M 200 200 Q 175 250 195 310" stroke="#222" stroke-width="2" fill="none"/>
  <path d="M 185 340 Q 200 390 230 420" stroke="#222" stroke-width="2" fill="none"/>
  <path d="M 600 200 Q 622 255 605 310" stroke="#222" stroke-width="2" fill="none"/>
  <path d="M 615 340 Q 598 390 570 420" stroke="#222" stroke-width="2" fill="none"/>
  <path d="M 290 165 Q 310 150 350 155" stroke="#222" stroke-width="2" fill="none"/>
  <path d="M 450 155 Q 490 150 510 165" stroke="#222" stroke-width="2" fill="none"/>

  <!-- Labels -->
  <!-- Hematoma label -->
  <line x1="530" y1="292" x2="590" y2="270" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="592" y="255" width="155" height="34" rx="6" fill="#1e1e1e" stroke="#555" stroke-width="1"/>
  <text x="670" y="276" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#e8e8e8" font-weight="700">Hyperdens · 50–80 HU</text>

  <!-- Edema label -->
  <line x1="405" y1="342" x2="360" y2="390" stroke="#aaa" stroke-width="1.5"/>
  <rect x="230" y="378" width="130" height="28" rx="6" fill="#1e1e1e" stroke="#555" stroke-width="1"/>
  <text x="295" y="397" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#aaaaaa">Perifok. Ödem</text>

  <!-- Ventricle label -->
  <line x1="445" y1="237" x2="490" y2="200" stroke="#888" stroke-width="1.2"/>
  <rect x="492" y="188" width="110" height="24" rx="5" fill="#1e1e1e" stroke="#444" stroke-width="1"/>
  <text x="547" y="204" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#888888">Seitenventrikel</text>

  <!-- Normal BG label -->
  <line x1="330" y1="285" x2="260" y2="310" stroke="#888" stroke-width="1.2"/>
  <rect x="155" y="300" width="105" height="24" rx="5" fill="#1e1e1e" stroke="#444" stroke-width="1"/>
  <text x="207" y="316" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#888888">Basalganglien</text>

  <!-- Title bar -->
  <rect x="0" y="530" width="800" height="50" fill="#111"/>
  <text x="400" y="553" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#aaaaaa">CT · axial · nativ · Akute ICB rechts putaminal/thalamisch (hypertensiv)</text>
  <text x="400" y="572" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#555555">Schema – keine reale Patientenaufnahme</text>

  <!-- CT window indicator -->
  <rect x="18" y="18" width="130" height="22" rx="4" fill="#1e1e1e" stroke="#444"/>
  <text x="83" y="33" text-anchor="middle" font-family="monospace" font-size="11" fill="#777">W:80  C:35</text>
</svg>
