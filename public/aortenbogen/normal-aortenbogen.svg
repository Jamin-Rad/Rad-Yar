<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Normaler linksseitiger Aortenbogen</title>
  <desc id="desc">Schematische Darstellung eines normalen linksseitigen Aortenbogens mit Truncus brachiocephalicus, linker Arteria carotis communis und linker Arteria subclavia.</desc>
  <defs>
    <linearGradient id="aorta" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="branch" x1="0" x2="1">
      <stop offset="0" stop-color="#f87171"/>
      <stop offset="1" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#7f1d1d" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect width="960" height="560" rx="34" fill="#f8fafc"/>
  <path d="M70 485 C155 502 236 494 310 462 C368 437 410 394 426 333 C442 270 421 218 456 168 C487 124 543 103 606 113 C671 124 724 166 745 225 C771 298 743 388 772 487" fill="none" stroke="url(#aorta)" stroke-width="56" stroke-linecap="round" filter="url(#shadow)"/>
  <path d="M512 126 C508 88 494 58 468 34" fill="none" stroke="url(#branch)" stroke-width="34" stroke-linecap="round"/>
  <path d="M468 34 L420 84" fill="none" stroke="url(#branch)" stroke-width="24" stroke-linecap="round"/>
  <path d="M468 34 L515 84" fill="none" stroke="url(#branch)" stroke-width="24" stroke-linecap="round"/>
  <path d="M604 114 C612 77 611 50 603 25" fill="none" stroke="url(#branch)" stroke-width="30" stroke-linecap="round"/>
  <path d="M687 159 C724 126 766 105 817 96" fill="none" stroke="url(#branch)" stroke-width="30" stroke-linecap="round"/>
  <path d="M421 84 C389 91 361 109 338 139" fill="none" stroke="#ef4444" stroke-width="14" stroke-linecap="round" opacity=".95"/>
  <path d="M515 84 C540 96 560 117 574 145" fill="none" stroke="#ef4444" stroke-width="14" stroke-linecap="round" opacity=".95"/>
  <text x="422" y="26" fill="#0f172a" font-family="Arial, sans-serif" font-size="22" font-weight="700">Truncus brachiocephalicus</text>
  <text x="292" y="158" fill="#475569" font-family="Arial, sans-serif" font-size="18">A. subclavia rechts</text>
  <text x="544" y="166" fill="#475569" font-family="Arial, sans-serif" font-size="18">A. carotis communis rechts</text>
  <text x="573" y="35" fill="#0f172a" font-family="Arial, sans-serif" font-size="22" font-weight="700">A. carotis communis links</text>
  <text x="720" y="89" fill="#0f172a" font-family="Arial, sans-serif" font-size="22" font-weight="700">A. subclavia links</text>
  <text x="380" y="520" fill="#991b1b" font-family="Arial, sans-serif" font-size="26" font-weight="800">Normal: linksseitiger Aortenbogen mit drei Abgängen</text>
  <text x="96" y="455" fill="#475569" font-family="Arial, sans-serif" font-size="20">Aorta ascendens</text>
  <text x="745" y="520" fill="#475569" font-family="Arial, sans-serif" font-size="20">Aorta descendens</text>
</svg>
